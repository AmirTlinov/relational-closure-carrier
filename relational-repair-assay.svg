<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Closure intervention and history-dependent repair</title>
  <desc id="desc">Two linked intervention diagrams. The first shows loss and restoration of an upper act through a surviving lower route. The second shows one relational field in which a witness-defined partition labels a held group and surrounding records, while the same local rule crosses that partition, retains a changed relation, and later repairs a matched injury.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#647381"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#176b87"/>
    </marker>
    <style>
      .label{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:18px;fill:#20303a}
      .small{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px;fill:#5b6a74}
      .micro{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;fill:#5b6a74}
      .section{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:18px;font-weight:650;letter-spacing:.05em;fill:#176b87}
      .line{stroke:#647381;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .blueLine{stroke:#176b87;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .nodeA{fill:#e7f3f6;stroke:#176b87;stroke-width:2}
      .nodeB{fill:#fff0e7;stroke:#b96732;stroke-width:2}
      .neutral{fill:#fff;stroke:#a7b2ba;stroke-width:2}
      .panel{fill:#fff;stroke:#d6dde2;stroke-width:1.5}
    </style>
  </defs>

  <text x="48" y="48" class="section">I · CLOSURE, ABLATION, RESTORATION</text>

  <g transform="translate(48 78)">
    <rect class="panel" x="0" y="0" width="340" height="202" rx="5.33"/>
    <text x="20" y="32" class="label" font-weight="600">Lower relations remain physical</text>
    <path d="M52 111 C90 63 142 63 180 111 S270 159 305 111" class="blueLine"/>
    <circle cx="52" cy="111" r="18" class="nodeA"/><text x="46" y="117" class="label">+</text>
    <circle cx="114" cy="82" r="18" class="nodeB"/><text x="108" y="88" class="label">−</text>
    <circle cx="180" cy="111" r="18" class="nodeA"/><text x="174" y="117" class="label">+</text>
    <circle cx="244" cy="140" r="18" class="nodeB"/><text x="238" y="146" class="label">−</text>
    <circle cx="305" cy="111" r="18" class="nodeA"/><text x="299" y="117" class="label">+</text>
    <text x="20" y="181" class="small">complete local return · traversable route</text>
  </g>

  <path d="M405 179 H470" class="line" marker-end="url(#arrow)"/>
  <text x="407" y="157" class="small">closure</text>

  <g transform="translate(486 78)">
    <rect class="panel" x="0" y="0" width="280" height="202" rx="5.33"/>
    <text x="20" y="32" class="label" font-weight="600">One higher-scale act</text>
    <circle cx="140" cy="104" r="53" fill="#e7f3f6" stroke="#176b87" stroke-width="3"/>
    <circle cx="140" cy="104" r="31" fill="#fff" stroke="#176b87" stroke-width="2"/>
    <path d="M117 104 H158" class="blueLine" marker-end="url(#arrowBlue)"/>
    <text x="95" y="178" class="small">one ordinary collision</text>
  </g>

  <path d="M783 179 H839" class="line" marker-end="url(#arrow)"/>
  <text x="786" y="157" class="small">ablate</text>

  <g transform="translate(854 78)">
    <rect class="panel" x="0" y="0" width="298" height="202" rx="5.33"/>
    <text x="20" y="32" class="label" font-weight="600">Loss, then material repair</text>
    <path d="M45 122 C82 78 125 78 162 122 S230 160 258 122" class="blueLine"/>
    <circle cx="45" cy="122" r="14" class="nodeA"/>
    <circle cx="101" cy="92" r="14" class="nodeB"/>
    <circle cx="162" cy="122" r="14" class="nodeA"/>
    <circle cx="218" cy="151" r="14" class="nodeB"/>
    <circle cx="258" cy="122" r="14" class="nodeA"/>
    <path d="M148 69 l14 -14 m-14 0 l14 14" stroke="#b2443f" stroke-width="4" stroke-linecap="round"/>
    <path d="M38 164 C100 173 164 176 214 174 S258 160 282 141" class="line" marker-end="url(#arrow)"/>
    <text x="18" y="195" class="micro">new local traversal restores act</text>
  </g>

  <line x1="48" y1="314" x2="1152" y2="314" stroke="#d7dee3" stroke-width="1.5"/>
  <text x="48" y="354" class="section">II · ONE RELATIONAL FIELD → CONTACT → RETENTION → REPAIR</text>

  <g transform="translate(48 382)">
    <rect class="panel" x="0" y="0" width="350" height="142" rx="5.33"/>
    <text x="20" y="31" class="label" font-weight="600">One field of differences</text>
    <path d="M-12 75 H314" class="blueLine" marker-end="url(#arrowBlue)"/>
    <circle cx="40" cy="75" r="14" class="nodeA"/>
    <circle cx="96" cy="75" r="14" class="nodeB"/>
    <circle cx="152" cy="75" r="14" class="nodeA"/>
    <circle cx="228" cy="75" r="14" class="neutral"/>
    <circle cx="292" cy="75" r="14" class="neutral"/>
    <line x1="190" y1="43" x2="190" y2="104" stroke="#647381" stroke-width="1.6" stroke-dasharray="5 5"/>
    <text x="132" y="119" class="micro">witness partition only</text>
    <text x="20" y="136" class="small">held group</text>
    <text x="224" y="136" class="small">other differences</text>
  </g>

  <path d="M414 453 H444" class="line" marker-end="url(#arrow)"/>

  <g transform="translate(460 382)">
    <rect class="panel" x="0" y="0" width="270" height="142" rx="5.33"/>
    <text x="20" y="31" class="label" font-weight="600">Encounter changes relation</text>
    <path d="M39 77 H220" class="blueLine" marker-end="url(#arrowBlue)"/>
    <circle cx="48" cy="77" r="15" class="nodeA"/>
    <circle cx="106" cy="77" r="15" class="nodeB"/>
    <circle cx="174" cy="77" r="15" class="nodeA"/>
    <circle cx="226" cy="77" r="15" class="nodeB"/>
    <path d="M226 101 C196 124 129 125 107 101" class="line" marker-end="url(#arrow)"/>
    <text x="20" y="132" class="small">same records · same local rule</text>
  </g>

  <path d="M746 453 H776" class="line" marker-end="url(#arrow)"/>

  <g transform="translate(792 382)">
    <rect class="panel" x="0" y="0" width="180" height="142" rx="5.33"/>
    <text x="18" y="31" class="label" font-weight="600">Relation retained</text>
    <path d="M27 72 H153" class="blueLine"/>
    <circle cx="55" cy="72" r="17" class="nodeA"/><text x="49" y="78" class="label">A</text>
    <circle cx="127" cy="72" r="17" class="nodeB"/><text x="121" y="78" class="label">B</text>
    <text x="18" y="124" class="micro">after witness removal</text>
  </g>

  <path d="M981 453 H990" class="line" marker-end="url(#arrow)"/>

  <g transform="translate(1000 382)">
    <rect class="panel" x="0" y="0" width="152" height="142" rx="5.33"/>
    <text x="16" y="31" class="label" font-weight="600">Matched cut</text>
    <path d="M29 74 H123" class="line"/>
    <path d="M68 61 l14 26 M82 61 L68 87" stroke="#b2443f" stroke-width="3.4" stroke-linecap="round"/>
    <text x="16" y="113" class="micro">AB: A1 · B2</text>
    <text x="16" y="132" class="micro">BA: A2 · B1</text>
  </g>

  <path d="M868 542 C880 574 1012 578 1068 537" class="line" marker-end="url(#arrow)"/>
  <text x="690" y="594" class="micro">witness removal · fresh-process restart · common washout</text>

  <g transform="translate(48 548)">
    <rect x="0" y="0" width="540" height="46" rx="5.33" fill="#fff" stroke="#d6dde2"/>
    <text x="16" y="17" class="micro" font-weight="650" fill="#176b87">RELATIONAL DISTINGUISHABILITY</text>
    <text x="16" y="37" class="small">one mmap preserves 2,058 events · placement shuffle erases A/B</text>
  </g>
</svg>
