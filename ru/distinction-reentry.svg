<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title id="title">Различие становится памятью через контакт, возврат и изменившийся будущий проход</title>
  <desc id="desc">Причинная последовательность начинается с альтернативы, которую не проявил данный контакт. Контакт входит в существующий материальный проход, локальное несовпадение меняет проводимость, возврат мира снова входит в изменённый материал, и следующий контакт расходится. Контроли freeze и shuffle разрывают ту же цепь.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#647381"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#176b87"/></marker>
    <style>
      .label{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:18px;fill:#20303a}
      .small{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:15px;fill:#5b6a74}
      .micro{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;fill:#5b6a74}
      .section{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:17px;font-weight:650;letter-spacing:.04em;fill:#176b87}
      .line{stroke:#647381;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .blueLine{stroke:#176b87;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .orangeLine{stroke:#a95b2d;stroke-width:2.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .node{fill:#e7f3f6;stroke:#176b87;stroke-width:2}.changed{fill:#fff0e7;stroke:#a95b2d;stroke-width:3}.neutral{fill:#fff;stroke:#a7b2ba;stroke-width:2}.panel{fill:#fff;stroke:#d6dde2;stroke-width:1.5}
    </style>
  </defs>
  <text x="44" y="38" class="section">РАЗЛИЧИЕ СТАНОВИТСЯ ПАМЯТЬЮ, ТОЛЬКО ИЗМЕНИВ БУДУЩИЙ КОНТАКТ</text>
  <g transform="translate(44 66)">
    <rect class="panel" width="208" height="190" rx="5.33"/><text x="18" y="30" class="label" font-weight="600">Скрытая альтернатива</text>
    <circle cx="74" cy="92" r="25" class="neutral"/><circle cx="136" cy="92" r="25" class="neutral"/><text x="68" y="99" class="label">A</text><text x="130" y="99" class="label">B</text><path d="M99 92 H111" class="line" stroke-dasharray="3 5"/>
    <text x="18" y="145" class="small">этот контакт не различает</text><text x="18" y="168" class="micro">различие всё же возможно</text>
  </g>
  <path d="M263 160 H305" class="line" marker-end="url(#arrow)"/><text x="267" y="140" class="small">контакт</text>
  <g transform="translate(320 66)">
    <rect class="panel" width="246" height="190" rx="5.33"/><text x="18" y="30" class="label" font-weight="600">Общий проход</text>
    <path d="M28 101 C64 59 102 59 130 101 S191 144 218 101" class="blueLine"/><circle cx="35" cy="94" r="15" class="node"/><circle cx="87" cy="73" r="15" class="node"/><circle cx="139" cy="111" r="15" class="node"/><circle cx="190" cy="129" r="15" class="node"/><circle cx="218" cy="101" r="15" class="node"/>
    <text x="18" y="160" class="small">та же форма — те же места</text><text x="18" y="181" class="micro">проход = чтение + изменение</text>
  </g>
  <path d="M577 160 H618" class="line" marker-end="url(#arrow)"/><text x="575" y="140" class="small">остаток</text>
  <g transform="translate(633 66)">
    <rect class="panel" width="220" height="190" rx="5.33"/><text x="18" y="30" class="label" font-weight="600">Проводимость меняется</text>
    <path d="M28 101 H190" class="blueLine"/><circle cx="42" cy="101" r="15" class="node"/><circle cx="92" cy="101" r="15" class="node"/><circle cx="142" cy="101" r="23" class="changed"/><circle cx="190" cy="101" r="15" class="node"/><path d="M130 89 L154 113 M154 89 L130 113" stroke="#a95b2d" stroke-width="3" stroke-linecap="round"/>
    <text x="18" y="157" class="small">открывается только нехватка</text><text x="18" y="179" class="micro">без награды и ответа-цели</text>
  </g>
  <path d="M864 160 H906" class="line" marker-end="url(#arrow)"/><text x="861" y="140" class="small">возврат</text>
  <g transform="translate(921 66)">
    <rect class="panel" width="235" height="190" rx="5.33"/><text x="18" y="30" class="label" font-weight="600">Будущий контакт расходится</text>
    <path d="M28 96 H95 C125 96 128 65 161 65 H207" class="blueLine" marker-end="url(#arrowBlue)"/><path d="M95 96 C125 96 128 132 161 132 H207" class="orangeLine" marker-end="url(#arrow)"/><circle cx="96" cy="96" r="16" class="changed"/>
    <text x="167" y="52" class="small">совпал</text><text x="167" y="153" class="small">не совпал</text><text x="18" y="179" class="micro">изменение будущего — квитанция</text>
  </g>
  <path d="M1040 270 C1010 328 734 337 718 267" class="blueLine" marker-end="url(#arrowBlue)"/><text x="755" y="296" class="small">действие меняет мир · мир возвращается через то же тело</text>
  <line x1="44" y1="350" x2="1156" y2="350" stroke="#d7dee3" stroke-width="1.5"/>
  <g transform="translate(44 374)"><rect width="330" height="62" rx="5.33" fill="#eaf4f7" stroke="#b9d5de"/><text x="16" y="24" class="section">LIVE</text><text x="78" y="24" class="small">возврат меняет следующий проход</text><text x="16" y="46" class="micro">контакт -> след -> возврат -> новый вход</text></g>
  <g transform="translate(390 374)"><rect width="330" height="62" rx="5.33" fill="#fff" stroke="#d6dde2"/><text x="16" y="24" class="section" fill="#647381">FREEZE</text><text x="91" y="24" class="small">тот же контакт, без перестройки</text><text x="16" y="46" class="micro">будущий проход не должен меняться</text></g>
  <g transform="translate(736 374)"><rect width="420" height="62" rx="5.33" fill="#fff1e8" stroke="#efd0bb"/><text x="16" y="24" class="section" fill="#a95b2d">SHUFFLE</text><text x="103" y="24" class="small">та же мера, нарушен порядок</text><text x="16" y="46" class="micro">D+ читает потерю, но не выбирает путь</text></g>
</svg>
